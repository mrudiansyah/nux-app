name: Deploy to K3s (NUX App)

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: mrudiansyah14/nux-app
  INFRA_REPO: mrudiansyah/infra
  INFRA_FOLDER: production/nux-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Kode Aplikasi
        uses: actions/checkout@v4

      - name: 🐳 Login ke Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: 🔨 Build & Push Image
        run: |
          TAG=$(date +%Y%m%d)-${GITHUB_SHA::7}
          FULL_IMAGE="${{ env.DOCKER_IMAGE }}:$TAG"
          
          docker build -t $FULL_IMAGE -t ${{ env.DOCKER_IMAGE }}:latest .
          docker push $FULL_IMAGE
          docker push ${{ env.DOCKER_IMAGE }}:latest
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: 📂 Checkout Repository Infra
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: 📝 Update Manifest di Repo Infra
        run: |
          mkdir -p infra-repo/${{ env.INFRA_FOLDER }}
          cp k8s/k8s-manifest.yaml infra-repo/${{ env.INFRA_FOLDER }}/k8s-manifest.yaml
          
          # Update Image dengan Tag Baru
          sed -i "s|image: ${{ env.DOCKER_IMAGE }}:.*|image: ${{ env.DOCKER_IMAGE }}:${{ env.IMAGE_TAG }}|g" infra-repo/${{ env.INFRA_FOLDER }}/k8s-manifest.yaml
          
          # Update Timestamp
          sed -i "s/deployment-timestamp: .*/deployment-timestamp: \"$(date)\"/g" infra-repo/${{ env.INFRA_FOLDER }}/k8s-manifest.yaml
          
          cd infra-repo
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add ${{ env.INFRA_FOLDER }}/k8s-manifest.yaml
          git commit -m "deploy(nux-app): update image to ${{ env.IMAGE_TAG }} [skip ci]" || echo "No changes"
          git push origin main
